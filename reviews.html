<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Yomu//Reviews</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="index.html"><h1>Yomu<span>//Reviews</span></h1></a>
        </div>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search reviews...">
            </div>

            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>All Reviews</h2>
                <p>By a reader, for a reader.</p>
            </div>
        </section>

        <div class="filter-bar">
            <button class="filter-btn active" data-genre="all">All</button>
            <button class="filter-btn" data-genre="action">Action</button>
            <button class="filter-btn" data-genre="fantasy">Fantasy</button>
            <button class="filter-btn" data-genre="adventure">Adventure</button>
            <button class="filter-btn" data-genre="drama">Drama</button>
            <button class="filter-btn" data-genre="supernatural">Supernatural</button>
            <button class="filter-btn" data-genre="isekai">Isekai</button>
            <button class="filter-btn" data-genre="comedy">Comedy</button>
        </div>

        <section class="reviews">
            <div class="container-grid" id="reviews-grid">
                <p style="text-align:center; color:var(--text-muted); grid-column:1/-1;">Loading reviews...</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 <a href="admin.html" class="footer-hidden">Yomu//Reviews</a> &middot; <a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a></p>
        <p>All Rights Reserved</p>
    </footer>

    <button class="back-to-top"><i class="fas fa-arrow-up"></i></button>
    <script src="script.js"></script>

    <script>
        /*load all reviews from supabase*/
        async function loadAllReviews() {
            const { data, error } = await db.from("reviews").select("*").order("created_at", { ascending: false });

            if (error) {
                console.log("Error loading reviews:", error);
                return;
            }

            const grid = document.getElementById("reviews-grid");
            grid.innerHTML = "";

            data.forEach(function (review) {
                const card = createReviewCard(review);
                grid.appendChild(card);
            });

            /*init genre filter after cards are loaded*/
            const filterButtons = document.querySelectorAll(".filter-btn");
            const cards = document.querySelectorAll(".container");

            filterButtons.forEach(function (btn) {
                btn.addEventListener("click", function () {
                    filterButtons.forEach(function (b) { b.classList.remove("active"); });
                    btn.classList.add("active");

                    const genre = btn.dataset.genre;

                    cards.forEach(function (card) {
                        const cardGenre = card.querySelector(".genre").textContent.toLowerCase();
                        card.style.display = (genre === "all" || cardGenre.includes(genre)) ? "" : "none";
                    });
                });
            });

            /*init search after cards are loaded*/
            $(".search-box input").on("keyup", function () {
                const query = $(this).val().toLowerCase();

                $(".container").each(function () {
                    const title = $(this).find("h4").text().toLowerCase();
                    const genre = $(this).find(".genre").text().toLowerCase();

                    if (title.indexOf(query) > -1 || genre.indexOf(query) > -1) {
                        $(this).show();
                    } else {
                        $(this).hide();
                    }
                });
            });

            /*init favorites after cards are loaded*/
            initFavorites();
        }

        loadAllReviews();
    </script>
</body>
</html>
