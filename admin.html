<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Yomu//Reviews</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="index.html"><h1>Yomu<span>//Reviews</span></h1></a>
        </div>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>Admin Panel</h2>
                <p id="admin-status">Please log in to continue.</p>
            </div>
        </section>

        <section class="admin-section">

            <div id="login-section">
                <h3 class="admin-heading">🔒 Admin Login</h3>
                <form id="login-form" class="admin-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="Enter your admin email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn" id="login-btn">Log In</button>
                    <p id="login-error" class="form-error"></p>
                </form>
            </div>

            <div id="review-section" style="display:none;">
                <div class="admin-toolbar">
                    <h3 class="admin-heading">📝 Add New Review</h3>
                    <button id="logout-btn" class="btn btn-outline">Log Out</button>
                </div>
                <form id="review-form" class="admin-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" placeholder="e.g. Solo Leveling" required>
                        </div>
                        <div class="form-group">
                            <label for="author">Author</label>
                            <input type="text" id="author" placeholder="e.g. Chugong" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="artist">Artist</label>
                            <input type="text" id="artist" placeholder="e.g. DUBU" required>
                        </div>
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status" required>
                                <option value="Ongoing">Ongoing</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="genre">Genre</label>
                            <input type="text" id="genre" placeholder="e.g. Action, Fantasy" required>
                        </div>
                        <div class="form-group">
                            <label for="rating">Rating (out of 5)</label>
                            <input type="number" id="rating" min="1" max="5" step="0.5" placeholder="e.g. 4.5" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="gist">Short Description (for card)</label>
                        <input type="text" id="gist" placeholder="e.g. The weakest hunter becomes the strongest..." required>
                    </div>

                    <div class="form-group">
                        <label for="image_url">Cover Image URL</label>
                        <input type="text" id="image_url" placeholder="Paste the image URL here..." required>
                    </div>

                    <div class="form-group">
                        <label for="overview">Overview</label>
                        <textarea id="overview" rows="5" placeholder="Write the overview section..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="story">Story</label>
                        <textarea id="story" rows="5" placeholder="Write the story review..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="art">Art</label>
                        <textarea id="art" rows="5" placeholder="Write the art review..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="characters">Characters</label>
                        <textarea id="characters" rows="5" placeholder="Write the characters review..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="verdict">Final Verdict</label>
                        <textarea id="verdict" rows="5" placeholder="Write the final verdict..." required></textarea>
                    </div>

                    <button type="submit" class="btn" id="submit-btn">Add Review</button>
                </form>

                <div class="admin-divider"></div>

                <div class="admin-toolbar">
                    <h3 class="admin-heading">🗑️ Manage Reviews</h3>
                </div>
                <div id="reviews-list" class="reviews-list">
                    <p style="color:var(--text-muted);">Loading reviews...</p>
                </div>
            </div>

        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 <a href="admin.html" class="footer-hidden">Yomu//Reviews</a> &middot; <a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a></p>
        <p>All Rights Reserved</p>
    </footer>

    <button class="back-to-top"><i class="fas fa-arrow-up"></i></button>
    <script src="script.js"></script>

    <script>
        const loginSection = document.getElementById("login-section");
        const reviewSection = document.getElementById("review-section");
        const adminStatus = document.getElementById("admin-status");

        /*check if already logged in*/
        async function checkSession() {
            const { data } = await db.auth.getSession();

            if (data.session) {
                showReviewForm(data.session.user.email);
            }
        }

        /*show review form, hide login*/
        function showReviewForm(email) {
            loginSection.style.display = "none";
            reviewSection.style.display = "block";
            adminStatus.textContent = "Logged in as " + email;
            loadReviewsList();
        }

        /*login form*/
        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const loginBtn = document.getElementById("login-btn");
            const loginError = document.getElementById("login-error");
            loginBtn.textContent = "Logging in...";
            loginBtn.disabled = true;
            loginError.textContent = "";

            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;

            const { data, error } = await db.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                loginError.textContent = "Login failed: " + error.message;
                loginBtn.textContent = "Log In";
                loginBtn.disabled = false;
            } else {
                showReviewForm(data.user.email);
            }
        });

        /*logout*/
        document.getElementById("logout-btn").addEventListener("click", async function () {
            await db.auth.signOut();
            loginSection.style.display = "block";
            reviewSection.style.display = "none";
            adminStatus.textContent = "Please log in to continue.";
        });

        /*add review form*/
        document.getElementById("review-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById("submit-btn");
            submitBtn.textContent = "Adding...";
            submitBtn.disabled = true;

            const review = {
                title: document.getElementById("title").value,
                author: document.getElementById("author").value,
                artist: document.getElementById("artist").value,
                status: document.getElementById("status").value,
                genre: document.getElementById("genre").value,
                rating: parseFloat(document.getElementById("rating").value),
                gist: document.getElementById("gist").value,
                image_url: document.getElementById("image_url").value,
                overview: document.getElementById("overview").value,
                story: document.getElementById("story").value,
                art: document.getElementById("art").value,
                characters: document.getElementById("characters").value,
                verdict: document.getElementById("verdict").value
            };

            const { error } = await db.from("reviews").insert([review]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Review added successfully!");
                document.getElementById("review-form").reset();
                loadReviewsList();
            }

            submitBtn.textContent = "Add Review";
            submitBtn.disabled = false;
        });

        /*load reviews list for managing*/
        async function loadReviewsList() {
            const list = document.getElementById("reviews-list");
            const { data, error } = await db.from("reviews").select("id, title, rating").order("created_at", { ascending: false });

            if (error) {
                list.innerHTML = "<p style='color:#ef4444;'>Error loading reviews.</p>";
                return;
            }

            if (data.length === 0) {
                list.innerHTML = "<p style='color:var(--text-muted);'>No reviews found.</p>";
                return;
            }

            list.innerHTML = "";

            data.forEach(function (review) {
                const item = document.createElement("div");
                item.className = "review-list-item";
                item.innerHTML =
                    '<div class="review-list-info">' +
                        '<strong>' + review.title + '</strong>' +
                        '<span>' + getStars(review.rating) + '</span>' +
                    '</div>' +
                    '<button class="btn-delete" data-id="' + review.id + '">' +
                        '<i class="fas fa-trash"></i> Delete' +
                    '</button>';
                list.appendChild(item);
            });

            /*attach delete handlers*/
            var deleteButtons = document.querySelectorAll(".btn-delete");
            deleteButtons.forEach(function (btn) {
                btn.addEventListener("click", function () {
                    var id = parseInt(btn.dataset.id);
                    deleteReview(id, btn);
                });
            });
        }

        /*delete a review*/
        async function deleteReview(id, btn) {
            var confirmed = confirm("Are you sure you want to delete this review?");
            if (!confirmed) return;

            btn.textContent = "Deleting...";
            btn.disabled = true;

            const { error } = await db.from("reviews").delete().eq("id", id);

            if (error) {
                alert("Error: " + error.message);
                btn.innerHTML = '<i class="fas fa-trash"></i> Delete';
                btn.disabled = false;
            } else {
                loadReviewsList();
            }
        }

        /*check session on page load*/
        checkSession();
    </script>
</body>
</html>
